<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Mensagens</title>
    <style>
        body {
            font: normal 15pt Arial;
        }

        button {
            padding: 30px;
            text-align: center;
            border-radius: 5%;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Desafio das Mensagens</h1>
    <div>
        <button onclick="btn1()">Botão 1</button>
        <button onclick="btn2()">Botão 2</button>
        <button onclick="btn3()">Botão 3</button>
    </div>
    
    <script>
        function btn1() {
            window.alert('Você clicou no 1° botão!')
        }
        function btn2() {
            window.alert('Você clicou no 2° botão!')
        }
        function btn3() {
            window.alert('Você clicou no 3° botão!')
        }
    </script>
</body>
</html>
